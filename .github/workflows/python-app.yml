# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more indocker-compose.tformation see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python application

on:
  push:
    branches: [master, develop]
    paths:
      - *.py
      - requirements.txt
      - requirements.in
      - .eslintrc
      - .pylintrc
      - .github/workflows/python-app.yml
  pull_request:
    branches: [master, develop]
    paths:
      - *.py
      - requirements.txt
      - requirements.in
      - .eslintrc
      - .pylintrc
      - .github/workflows/python-app.yml

jobs:
  lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - name: Install ldap dependencies
        run: sudo apt-get update && sudo apt-get install libldap2-dev libsasl2-dev
      - uses: actions/checkout@v2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install uv
          if [ -f requirements.txt ]; then uv pip install -r requirements.txt --system; fi
      - name: Lint with pylint
        run: |
          pylint conditional
